server:
  port: 8081
  servlet:
    context-path: /api

spring:
  main:
    allow-bean-definition-overriding: true
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchRestClientAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ReactiveElasticsearchRepositoriesAutoConfiguration
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://localhost:3306/supermarket2?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: ""
      database: 0
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  # 加这一行！激活dev环境，Spring就能读到你的华为云配置了




huawei:
  iot:
    mqtt:
      enabled: false
      hostUrl: ${HUAWEI_IOT_MQTT_HOST:}
      port: ${HUAWEI_IOT_MQTT_PORT:8883}
      username: ${HUAWEI_IOT_MQTT_USERNAME:}
      password: ${HUAWEI_IOT_MQTT_PASSWORD:}
      clientId: ${HUAWEI_IOT_MQTT_CLIENT_ID:}
      subscribeTopic: ${HUAWEI_IOT_MQTT_SUBSCRIBE_TOPIC:}
      reportTopic: ${HUAWEI_IOT_MQTT_REPORT_TOPIC:}
    amqp:
      enabled: false
      url: ${HUAWEI_IOT_AMQP_URL:}
      accessKey: ${HUAWEI_IOT_AMQP_ACCESS_KEY:}
      accessCode: ${HUAWEI_IOT_AMQP_ACCESS_CODE:}
      queueName: ${HUAWEI_IOT_AMQP_QUEUE:}

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.supermarket2.entity
  type-handlers-package: com.example.supermarket2.handler
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    call-setters-on-nulls: true
    cache-enabled: false
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

wechat:
  app-id: your-wechat-app-id
  app-secret: your-wechat-app-secret

knife4j:
  enable: true
  setting:
    enable-swagger-models: true
    language: zh_CN
    enable-request-cache: false
  openapi:
    title: 超市导航系统接口文档
    description: 超市导航与智能购物车后端API
    version: 1.0.0
    contact:
      name: 开发者

logging:
  level:
    root: INFO
    com.example.supermarket2: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId}] %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId}] %logger{50} - %msg%n"

file:
  upload:
    image-path: ./uploads/images

device:
  fixed:
    userId: 1
    cartId: 3

beacon:
  config:
    maxJumpDistance: 5.0
    medianWindowSize: 5
    emaAlpha: 0.3
    wlsMinBeacons: 4
    wlsMaxBeacons: 5
    wlsResidualThreshold: 2.0
    weightThreshold: 0.1
