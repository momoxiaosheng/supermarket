# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.supermarket2.entity
  type-handlers-package: com.example.supermarket2.handler
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    call-setters-on-nulls: true
    cache-enabled: false
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

wechat:
  app-id: your-wechat-app-id
  app-secret: your-wechat-app-secret

knife4j:
  enable: true
  setting:
    enable-swagger-models: true
    language: zh_CN
    enable-request-cache: false
  openapi:
    title: 超市导航系统接口文档
    description: 超市导航与智能购物车后端API
    version: 1.0.0
    contact:
      name: 开发者

logging:
  level:
    root: INFO
    com.example.supermarket2: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId}] %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId}] %logger{50} - %msg%n"

file:
  upload:
    image-path: ./uploads/images

device:
  fixed:
    userId: 1
    cartId: 3

beacon:
  config:
    maxJumpDistance: 5.0
    medianWindowSize: 5
    emaAlpha: 0.3
    wlsMinBeacons: 4
    wlsMaxBeacons: 5
    wlsResidualThreshold: 2.0
    weightThreshold: 0.1
